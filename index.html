<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Gems at the Beach BIA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="controls">
        <h3>Toggle Seasonal Routes</h3>
        <label><input type="checkbox" id="show-fall"> Fall Route</label>
        <label><input type="checkbox" id="show-spring"> Spring Route</label>
        <label><input type="checkbox" id="show-summer"> Summer Route</label>
        <label><input type="checkbox" id="show-winter"> Winter Route</label>
        <label><input type="checkbox" id="show-poi" checked> POI </label>
    </div>


    <!--Legend Stuff-->
    <div class="legend">
        <h3>Legend</h3>
        <div><span class="legend-item coffee"></span> Coffee</div>
        <div><span class="legend-item landmark"></span> Landmark/Attraction</div>
        <div><span class="legend-item park"></span> Park/Greenspace</div>
        <div><span class="legend-item recreation"></span> Recreation</div>
        <div><span class="legend-route Fall"></span> Fall Route</div>
        <div><span class="legend-route Spring"></span> Spring Route</div>
        <div><span class="legend-route Summer"></span> Summer Route</div>
        <div><span class="legend-route Winter"></span> Winter Route</div>
    </div>

        <div id="map" class="map"></div>

        <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
        <script src="script.js"></script>
</body>

</html>
